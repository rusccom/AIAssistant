<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <%= htmlWebpackPlugin.options.criticalCss %>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; }
        .app-container { min-height: 100vh; }
        #konva-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="app-page">
    <div class="app-container">
            <div class="editor-header">
            <h1 id="header-title">Visual State Editor</h1>
            <div class="header-controls">
                <div class="hc-left">
                    <span class="hc-label">Style</span>
                    <select class="form-control theme-switcher__control" data-client-theme-select></select>
                </div>
                <div class="hc-left">
                    <span class="hc-label">Domain</span>
                    <select id="domain-select" class="form-control">
                        <option value="">Select Domain</option>
                    </select>
                </div>
                <div class="hc-center">
                    <button id="add-state-btn" class="btn btn-primary">Add State</button>
                    <button id="save-states-btn" class="btn btn-success">Save</button>
                    <button id="load-states-btn" class="btn btn-secondary">Load States</button>
                    <button id="clear-canvas-btn" class="btn btn-danger">Clear All</button>
                </div>
                <div class="hc-right">
                    <button id="back-to-settings-btn" class="btn btn-secondary">Back to Settings</button>
                </div>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-sidebar">
                <div class="sidebar-section">
                    <h3>Properties</h3>
                    <div id="properties-panel">
                        <p>Select a state to edit its properties</p>
                    </div>
                </div>
            </div>
            <div class="editor-canvas-container">
                <div class="canvas-toolbar">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <button id="zoom-in-btn" class="btn btn-sm">+</button>
                        <button id="zoom-out-btn" class="btn btn-sm">-</button>
                        <button id="zoom-reset-btn" class="btn btn-sm">Reset</button>
                        <span id="zoom-level">100%</span>
                    </div>
                    <div id="connection-status" style="display: none;">
                        Click target to connect
                    </div>
                    <div style="flex: 1;"></div>
                </div>
                <div class="canvas-wrapper">
                    <div id="konva-container"></div>
                    <div id="canvas-content" class="canvas-content"></div>
                </div>
            </div>
        </div>
        <div id="context-menu" class="context-menu" style="display: none;">
            <div class="context-menu-item" data-action="create-connection">Create Connection</div>
            <div class="context-menu-item" data-action="edit-state">Edit State</div>
            <div class="context-menu-item" data-action="delete-state">Delete State</div>
        </div>
        <div id="edit-state-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-header-left">
                        <h3>Edit State</h3>
                        <button id="ai-assist-btn" class="btn btn-success">AI Assistant</button>
                    </div>
                    <button class="close-btn" id="close-edit-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>State ID:</label>
                        <input type="text" id="state-id-input" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Description:</label>
                        <textarea id="state-description-input" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Instructions:</label>
                        <textarea id="state-instructions-input" class="form-control" rows="5" placeholder="Enter instructions, one per line"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Examples:</label>
                        <textarea id="state-examples-input" class="form-control" rows="3" placeholder="Enter examples, one per line"></textarea>
                    </div>
                    <div class="form-group" id="state-reasoning-group" style="display: none;">
                        <label>Reasoning mode:</label>
                        <select id="state-reasoning-mode" class="form-control">
                            <option value="inherit">Inherit provider default</option>
                            <option value="fast">Fast</option>
                            <option value="balanced">Balanced</option>
                            <option value="deep">Deep</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="cancel-edit-btn" class="btn btn-secondary">Cancel</button>
                    <button id="save-edit-btn" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>
        <div id="ai-assist-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>AI Assistant</h3>
                    <button class="close-btn" id="close-ai-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="ai-prompt-input">What should this state do?</label>
                        <textarea id="ai-prompt-input" class="form-control" rows="4" placeholder="e.g., Greet the user and ask for their name"></textarea>
                    </div>
                    <div id="ai-error-message" class="error-message" style="display: none;"></div>
                </div>
                <div class="modal-footer">
                    <button id="cancel-ai-btn" class="btn btn-secondary">Cancel</button>
                    <button id="generate-content-btn" class="btn btn-primary">Generate</button>
                </div>
            </div>
        </div>
    </div>
    <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif?collect-dnt=true" alt="" referrerpolicy="no-referrer-when-downgrade"/></noscript>
</body>
</html>
